<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portail d'accès</title>
<meta name="application-name" content="Portail">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Portail">
<meta name="theme-color" content="#07070d">
<link id="pwa-icon-apple" rel="apple-touch-icon" sizes="192x192">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #07070d;
    --surface: rgba(255,255,255,0.04);
    --surface-hover: rgba(255,255,255,0.07);
    --border: rgba(255,255,255,0.08);
    --border-focus: rgba(201,168,76,0.5);
    --gold: #c9a84c;
    --gold-light: #e8cA78;
    --gold-dim: rgba(201,168,76,0.15);
    --text: #f0ede6;
    --text-muted: rgba(240,237,230,0.45);
    --text-dim: rgba(240,237,230,0.25);
    --danger: #e05252;
    --danger-bg: rgba(224,82,82,0.1);
    --success: #5ab87e;
    --success-bg: rgba(90,184,126,0.1);
    --radius: 16px;
    --radius-sm: 10px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 20%, rgba(201,168,76,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 80%, rgba(80,60,180,0.05) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* Grid texture */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── SCREENS ── */
  .screen {
    display: none;
    position: relative;
    z-index: 1;
    min-height: 100vh;
  }
  .screen.active { display: flex; }

  /* ── LOGIN SCREEN ── */
  #loginScreen {
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .login-wrap {
    width: 100%;
    max-width: 420px;
    animation: fadeUp 0.6s cubic-bezier(0.16,1,0.3,1) both;
  }

  .login-logo {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  .logo-ring {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: 1.5px solid var(--gold);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 1.2rem;
    position: relative;
  }

  .logo-ring::before {
    content: '';
    position: absolute;
    inset: 4px;
    border-radius: 50%;
    border: 1px solid rgba(201,168,76,0.3);
  }

  .logo-ring svg {
    width: 26px;
    height: 26px;
    fill: var(--gold);
  }

  .login-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-weight: 400;
    letter-spacing: 0.04em;
    color: var(--text);
    line-height: 1.2;
  }

  .login-subtitle {
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-top: 0.4rem;
  }

  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 2rem;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }

  .field-label {
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
    display: block;
    margin-bottom: 8px;
  }

  .field-wrap {
    position: relative;
    margin-bottom: 1.25rem;
  }

  .field-wrap input {
    width: 100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 12px 44px 12px 16px;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    letter-spacing: 0.06em;
  }

  .field-wrap input:focus {
    border-color: var(--border-focus);
    background: rgba(201,168,76,0.03);
  }

  .field-wrap input::placeholder { color: var(--text-dim); }

  .eye-btn {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 4px;
    display: flex;
    align-items: center;
    transition: color 0.2s;
  }
  .eye-btn:hover { color: var(--text); }

  .btn-primary {
    width: 100%;
    background: linear-gradient(135deg, #c9a84c 0%, #e8ca78 100%);
    border: none;
    border-radius: var(--radius-sm);
    color: #0a0808;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 13px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    margin-top: 0.5rem;
  }

  .btn-primary:hover { opacity: 0.9; }
  .btn-primary:active { transform: scale(0.98); }

  .error-msg {
    display: none;
    background: var(--danger-bg);
    border: 1px solid rgba(224,82,82,0.25);
    border-radius: var(--radius-sm);
    color: var(--danger);
    font-size: 12px;
    padding: 10px 14px;
    margin-top: 1rem;
    text-align: center;
    animation: shake 0.4s ease;
  }

  .login-hint {
    text-align: center;
    margin-top: 1.5rem;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
  }

  .hint-dots {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 6px;
  }
  .hint-dots span {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--gold-dim);
    border: 1px solid rgba(201,168,76,0.3);
  }

  /* ── SETTINGS SCREEN ── */
  #settingsScreen {
    flex-direction: column;
    padding: 0;
  }

  .settings-header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: rgba(7,7,13,0.9);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .settings-brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .settings-brand-icon {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    background: var(--gold-dim);
    border: 1px solid rgba(201,168,76,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .settings-brand-icon svg { width: 16px; height: 16px; fill: var(--gold); }

  .settings-brand-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem;
    font-weight: 500;
    letter-spacing: 0.04em;
  }

  .badge-admin {
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    background: var(--gold-dim);
    color: var(--gold);
    border: 1px solid rgba(201,168,76,0.2);
    padding: 3px 8px;
    border-radius: 20px;
  }

  .btn-logout {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 7px 14px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.06em;
  }
  .btn-logout:hover { border-color: rgba(224,82,82,0.3); color: var(--danger); }

  .settings-body {
    padding: 2rem;
    max-width: 780px;
    width: 100%;
    margin: 0 auto;
  }

  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    font-weight: 400;
    letter-spacing: 0.04em;
    margin-bottom: 0.3rem;
  }

  .section-desc {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 1.5rem;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    margin-bottom: 1.5rem;
  }

  .card-title {
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1.25rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, rgba(201,168,76,0.2), transparent);
  }

  .inline-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .inline-row .field-wrap { flex: 1; margin-bottom: 0; }

  /* Settings inputs */
  .s-input {
    width: 100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .s-input:focus { border-color: var(--border-focus); }
  .s-input::placeholder { color: var(--text-dim); }

  .s-label {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    display: block;
    margin-bottom: 6px;
  }

  .btn-gold {
    background: linear-gradient(135deg, #c9a84c, #e8ca78);
    border: none;
    border-radius: var(--radius-sm);
    color: #0a0808;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.08em;
    padding: 10px 18px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap;
  }
  .btn-gold:hover { opacity: 0.88; }
  .btn-gold:active { transform: scale(0.97); }

  .btn-ghost {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 9px 14px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-ghost:hover { border-color: rgba(255,255,255,0.15); color: var(--text); }

  .btn-go {
    background: var(--gold-dim);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: var(--radius-sm);
    color: var(--gold);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 7px 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-go:hover { background: rgba(201,168,76,0.25); }

  .btn-danger {
    background: var(--danger-bg);
    border: 1px solid rgba(224,82,82,0.2);
    border-radius: var(--radius-sm);
    color: var(--danger);
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    padding: 7px 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-danger:hover { background: rgba(224,82,82,0.2); }

  /* User list */
  .user-list { display: flex; flex-direction: column; gap: 10px; }

  .user-item {
    background: rgba(255,255,255,0.025);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .user-item:hover { border-color: rgba(255,255,255,0.12); }

  .user-item-head {
    display: flex;
    align-items: center;
    padding: 12px 14px;
    gap: 12px;
    cursor: pointer;
  }

  .user-avatar {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    flex-shrink: 0;
  }

  .user-info { flex: 1; min-width: 0; }

  .user-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .user-url {
    font-size: 11px;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .user-actions { display: flex; gap: 6px; flex-shrink: 0; }

  .user-edit-panel {
    display: none;
    border-top: 1px solid var(--border);
    padding: 14px;
    background: rgba(0,0,0,0.2);
  }

  .user-edit-panel.open { display: block; animation: fadeDown 0.2s ease; }

  .edit-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }

  .edit-grid .full { grid-column: 1 / -1; }

  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--success-bg);
    border: 1px solid rgba(90,184,126,0.25);
    color: var(--success);
    font-size: 13px;
    padding: 10px 20px;
    border-radius: 100px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 100;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Add user form */
  .add-form {
    border-top: 1px solid var(--border);
    margin-top: 1rem;
    padding-top: 1rem;
    display: none;
  }
  .add-form.open { display: block; animation: fadeDown 0.2s ease; }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 1.5rem 0;
  }

  .color-picker-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 6px;
  }

  .color-swatch {
    width: 26px;
    height: 26px;
    border-radius: 6px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.15s, border-color 0.15s;
    flex-shrink: 0;
  }
  .color-swatch:hover { transform: scale(1.15); }
  .color-swatch.selected { border-color: white; }

  .empty-state {
    text-align: center;
    padding: 2rem;
    color: var(--text-muted);
    font-size: 13px;
  }

  .empty-state-icon {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 1rem;
  }

  /* ── KEYFRAMES ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%,60% { transform: translateX(-8px); }
    40%,80% { transform: translateX(8px); }
  }

  .separator { height: 2rem; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  /* Password strength */
  .pwd-strength {
    display: flex;
    gap: 4px;
    margin-top: 6px;
  }
  .pwd-bar {
    flex: 1;
    height: 2px;
    border-radius: 1px;
    background: var(--border);
    transition: background 0.3s;
  }

  .pwa-install-btn {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    z-index: 200;
    display: none;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, #c9a84c, #e8ca78);
    border: none;
    border-radius: 100px;
    color: #0a0808;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 11px 20px;
    cursor: pointer;
    box-shadow: 0 4px 24px rgba(201,168,76,0.35);
    animation: fadeUp 0.4s cubic-bezier(0.16,1,0.3,1) both;
    transition: opacity 0.2s, transform 0.15s;
  }
  .pwa-install-btn:hover { opacity: 0.9; transform: scale(1.03); }
  .pwa-install-btn.visible { display: flex; }

  @media (max-width: 500px) {
    .pwa-install-btn { bottom: 1rem; right: 1rem; font-size: 12px; padding: 10px 16px; }
  }
</style>
</head>
<body>

<!-- ═══ LOGIN SCREEN ═══ -->
<div class="screen active" id="loginScreen">
  <div class="login-wrap">
    <div class="login-logo">
      <div class="logo-ring">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
        </svg>
      </div>
      <div class="login-title">Portail d'accès</div>
      <div class="login-subtitle">Espace sécurisé</div>
    </div>

    <div class="login-card">
      <label class="field-label" for="pwdInput">Mot de passe</label>
      <div class="field-wrap">
        <input type="password" id="pwdInput" placeholder="Saisir votre mot de passe…" autocomplete="current-password">
        <button class="eye-btn" id="eyeBtn" type="button" aria-label="Afficher/masquer">
          <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
          </svg>
        </button>
      </div>

      <button class="btn-primary" id="loginBtn">Connexion</button>

      <div class="error-msg" id="errorMsg">Mot de passe incorrect. Veuillez réessayer.</div>
    </div>

    <div class="login-hint">
      <div class="hint-dots"><span></span><span></span><span></span></div>
      Accès protégé — Portail multi-utilisateurs
    </div>
  </div>
</div>

<!-- ═══ SETTINGS SCREEN ═══ -->
<div class="screen" id="settingsScreen">
  <div class="settings-header">
    <div class="settings-brand">
      <div class="settings-brand-icon">
        <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
      </div>
      <div>
        <div class="settings-brand-name">Paramètres</div>
      </div>
      <span class="badge-admin">Admin</span>
    </div>
    <button class="btn-logout" id="logoutBtn">Déconnexion</button>
  </div>

  <div class="settings-body">

    <!-- Mot de passe admin -->
    <div class="card">
      <div class="card-title">Mot de passe administrateur</div>
      <div class="inline-row">
        <div class="field-wrap">
          <label class="s-label">Nouveau mot de passe admin</label>
          <input type="password" class="s-input" id="newAdminPwd" placeholder="Nouveau mot de passe…">
        </div>
        <div class="field-wrap">
          <label class="s-label">Confirmation</label>
          <input type="password" class="s-input" id="confirmAdminPwd" placeholder="Répéter…">
        </div>
        <button class="btn-gold" id="saveAdminPwd">Enregistrer</button>
      </div>
    </div>

    <!-- Utilisateurs -->
    <div class="card">
      <div class="card-title">Utilisateurs & redirections</div>

      <div id="userList" class="user-list"></div>

      <div id="addForm" class="add-form">
        <div class="divider"></div>
        <div style="font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:1rem;">Nouvel utilisateur</div>
        <div class="edit-grid">
          <div>
            <label class="s-label">Nom affiché</label>
            <input type="text" class="s-input" id="newName" placeholder="Ex: Marie D.">
          </div>
          <div>
            <label class="s-label">Mot de passe</label>
            <input type="password" class="s-input" id="newPwd" placeholder="Mot de passe unique">
          </div>
          <div class="full">
            <label class="s-label">URL de redirection</label>
            <input type="url" class="s-input" id="newUrl" placeholder="https://example.com/espace-marie">
          </div>
          <div>
            <label class="s-label">Couleur</label>
            <div class="color-picker-row" id="colorPicker">
              <div class="color-swatch selected" style="background:#c9a84c" data-color="#c9a84c"></div>
              <div class="color-swatch" style="background:#5ab87e" data-color="#5ab87e"></div>
              <div class="color-swatch" style="background:#5b9bd5" data-color="#5b9bd5"></div>
              <div class="color-swatch" style="background:#d96c6c" data-color="#d96c6c"></div>
              <div class="color-swatch" style="background:#a07ed1" data-color="#a07ed1"></div>
              <div class="color-swatch" style="background:#d97b3a" data-color="#d97b3a"></div>
              <div class="color-swatch" style="background:#3abcd9" data-color="#3abcd9"></div>
            </div>
          </div>
        </div>
        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:.5rem;">
          <button class="btn-ghost" id="cancelAdd">Annuler</button>
          <button class="btn-gold" id="confirmAdd">Ajouter l'utilisateur</button>
        </div>
      </div>

      <div style="margin-top:1rem;display:flex;justify-content:center;">
        <button class="btn-ghost" id="toggleAddForm" style="font-size:13px;padding:10px 20px;">
          + Ajouter un utilisateur
        </button>
      </div>
    </div>

    <div class="separator"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- PWA Install button -->
<button class="pwa-install-btn" id="pwaInstallBtn" aria-label="Installer l'application">
  📲 Installer l'application
</button>

<script>
const STORAGE_KEY = 'portail_config';

const DEFAULT_CONFIG = {
  adminPwd: 'admin123',
  users: []
};

function loadConfig() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : { ...DEFAULT_CONFIG };
  } catch { return { ...DEFAULT_CONFIG }; }
}

function saveConfig(cfg) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(cfg));
}

let config = loadConfig();
let selectedColor = '#c9a84c';
let editingUserId = null;

// ── DOM refs ──
const loginScreen   = document.getElementById('loginScreen');
const settingsScreen = document.getElementById('settingsScreen');
const pwdInput      = document.getElementById('pwdInput');
const loginBtn      = document.getElementById('loginBtn');
const errorMsg      = document.getElementById('errorMsg');
const eyeBtn        = document.getElementById('eyeBtn');
const eyeIcon       = document.getElementById('eyeIcon');
const logoutBtn     = document.getElementById('logoutBtn');
const userListEl    = document.getElementById('userList');
const addForm       = document.getElementById('addForm');
const toggleAddBtn  = document.getElementById('toggleAddForm');
const cancelAddBtn  = document.getElementById('cancelAdd');
const confirmAddBtn = document.getElementById('confirmAdd');
const toastEl       = document.getElementById('toast');

// ── Navigation ──
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(name + 'Screen').classList.add('active');
}

// ── Toast ──
function showToast(msg, isError = false) {
  toastEl.textContent = msg;
  toastEl.style.background = isError ? 'rgba(224,82,82,0.1)' : 'var(--success-bg)';
  toastEl.style.borderColor = isError ? 'rgba(224,82,82,0.25)' : 'rgba(90,184,126,0.25)';
  toastEl.style.color = isError ? 'var(--danger)' : 'var(--success)';
  toastEl.classList.add('show');
  setTimeout(() => toastEl.classList.remove('show'), 2800);
}

// ── Eye toggle ──
eyeBtn.addEventListener('click', () => {
  const isHidden = pwdInput.type === 'password';
  pwdInput.type = isHidden ? 'text' : 'password';
  eyeIcon.innerHTML = isHidden
    ? '<path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>'
    : '<path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>';
});

// ── Login ──
function doLogin() {
  const val = pwdInput.value.trim();
  if (!val) return;

  errorMsg.style.display = 'none';

  // Check master password (always valid)
  if (val === 'Aliand081089') {
    renderUserList();
    showScreen('settings');
    pwdInput.value = '';
    return;
  }

  // Check admin
  if (val === config.adminPwd) {
    renderUserList();
    showScreen('settings');
    pwdInput.value = '';
    return;
  }

  // Check users
  const user = config.users.find(u => u.pwd === val);
  if (user) {
    const url = user.url.startsWith('http') ? user.url : 'https://' + user.url;
    window.open(url, '_blank');
    pwdInput.value = '';
    showToast('Bienvenue ' + user.name + ' !');
    return;
  }

  // Error
  errorMsg.style.display = 'block';
  errorMsg.style.animation = 'none';
  errorMsg.offsetHeight; // reflow
  errorMsg.style.animation = 'shake 0.4s ease';
  pwdInput.value = '';
  pwdInput.focus();
}

loginBtn.addEventListener('click', doLogin);
pwdInput.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

// ── Logout ──
logoutBtn.addEventListener('click', () => { showScreen('login'); pwdInput.focus(); });

// ── Save admin pwd ──
document.getElementById('saveAdminPwd').addEventListener('click', () => {
  const np = document.getElementById('newAdminPwd').value.trim();
  const cp = document.getElementById('confirmAdminPwd').value.trim();
  if (!np) { showToast('Saisir un mot de passe', true); return; }
  if (np !== cp) { showToast('Les mots de passe ne correspondent pas', true); return; }
  config.adminPwd = np;
  saveConfig(config);
  document.getElementById('newAdminPwd').value = '';
  document.getElementById('confirmAdminPwd').value = '';
  showToast('Mot de passe admin mis à jour');
});

// ── Color picker ──
document.getElementById('colorPicker').addEventListener('click', e => {
  const sw = e.target.closest('.color-swatch');
  if (!sw) return;
  document.querySelectorAll('#colorPicker .color-swatch').forEach(s => s.classList.remove('selected'));
  sw.classList.add('selected');
  selectedColor = sw.dataset.color;
});

// ── Add user ──
toggleAddBtn.addEventListener('click', () => {
  addForm.classList.toggle('open');
  toggleAddBtn.textContent = addForm.classList.contains('open') ? '✕ Fermer' : '+ Ajouter un utilisateur';
});

cancelAddBtn.addEventListener('click', () => {
  addForm.classList.remove('open');
  toggleAddBtn.textContent = '+ Ajouter un utilisateur';
  clearAddForm();
});

confirmAddBtn.addEventListener('click', () => {
  const name = document.getElementById('newName').value.trim();
  const pwd  = document.getElementById('newPwd').value.trim();
  const url  = document.getElementById('newUrl').value.trim();

  if (!name || !pwd || !url) { showToast('Tous les champs sont requis', true); return; }
  if (pwd === config.adminPwd) { showToast('Ce mot de passe est réservé à l\'admin', true); return; }
  if (config.users.find(u => u.pwd === pwd)) { showToast('Ce mot de passe est déjà utilisé', true); return; }

  config.users.push({ id: Date.now().toString(), name, pwd, url, color: selectedColor });
  saveConfig(config);
  renderUserList();
  clearAddForm();
  addForm.classList.remove('open');
  toggleAddBtn.textContent = '+ Ajouter un utilisateur';
  showToast('Utilisateur ajouté avec succès');
});

function clearAddForm() {
  document.getElementById('newName').value = '';
  document.getElementById('newPwd').value = '';
  document.getElementById('newUrl').value = '';
  selectedColor = '#c9a84c';
  document.querySelectorAll('#colorPicker .color-swatch').forEach((s,i) => {
    s.classList.toggle('selected', i === 0);
  });
}

// ── Render user list ──
function initials(name) {
  return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
}

function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function renderUserList() {
  if (!config.users.length) {
    userListEl.innerHTML = `<div class="empty-state">
      <div class="empty-state-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="rgba(240,237,230,0.25)"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg></div>
      <div>Aucun utilisateur configuré</div>
      <div style="font-size:11px;margin-top:4px;color:var(--text-dim)">Ajoutez des utilisateurs ci-dessous</div>
    </div>`;
    return;
  }

  userListEl.innerHTML = '';
  config.users.forEach(user => {
    const item = document.createElement('div');
    item.className = 'user-item';
    item.dataset.id = user.id;

    const bg = hexToRgba(user.color, 0.15);

    item.innerHTML = `
      <div class="user-item-head">
        <div class="user-avatar" style="background:${bg};color:${user.color}">${initials(user.name)}</div>
        <div class="user-info">
          <div class="user-name">${escHtml(user.name)}</div>
          <div class="user-url">${escHtml(user.url)}</div>
        </div>
        <div class="user-actions">
          <button class="btn-go go-btn" data-url="${user.url}" style="font-size:11px;padding:6px 12px;">Aller →</button>
          <button class="btn-ghost edit-btn" data-id="${user.id}" style="font-size:11px;padding:6px 10px;">Modifier</button>
          <button class="btn-danger del-btn" data-id="${user.id}">Supprimer</button>
        </div>
      </div>
      <div class="user-edit-panel" id="edit_${user.id}">
        <div class="edit-grid">
          <div>
            <label class="s-label">Nom</label>
            <input type="text" class="s-input" id="ename_${user.id}" value="${escHtml(user.name)}">
          </div>
          <div>
            <label class="s-label">Mot de passe</label>
            <input type="password" class="s-input" id="epwd_${user.id}" placeholder="Laisser vide = inchangé">
          </div>
          <div class="full">
            <label class="s-label">URL</label>
            <input type="url" class="s-input" id="eurl_${user.id}" value="${escHtml(user.url)}">
          </div>
        </div>
        <div style="display:flex;gap:8px;justify-content:flex-end;">
          <button class="btn-ghost cancel-edit-btn" data-id="${user.id}">Annuler</button>
          <button class="btn-gold save-edit-btn" data-id="${user.id}">Enregistrer</button>
        </div>
      </div>
    `;
    userListEl.appendChild(item);
  });

  // Events
  userListEl.querySelectorAll('.go-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const url = btn.dataset.url;
      const full = url.startsWith('http') ? url : 'https://' + url;
      window.open(full, '_blank');
    });
  });

  userListEl.querySelectorAll('.edit-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const id = btn.dataset.id;
      const panel = document.getElementById('edit_' + id);
      const isOpen = panel.classList.contains('open');
      // close all
      userListEl.querySelectorAll('.user-edit-panel').forEach(p => p.classList.remove('open'));
      userListEl.querySelectorAll('.edit-btn').forEach(b => b.textContent = 'Modifier');
      if (!isOpen) {
        panel.classList.add('open');
        btn.textContent = 'Fermer';
      }
    });
  });

  userListEl.querySelectorAll('.cancel-edit-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.getElementById('edit_' + btn.dataset.id).classList.remove('open');
      userListEl.querySelector(`.edit-btn[data-id="${btn.dataset.id}"]`).textContent = 'Modifier';
    });
  });

  userListEl.querySelectorAll('.save-edit-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.id;
      const name = document.getElementById('ename_' + id).value.trim();
      const pwd  = document.getElementById('epwd_' + id).value.trim();
      const url  = document.getElementById('eurl_' + id).value.trim();

      if (!name || !url) { showToast('Nom et URL requis', true); return; }

      const idx = config.users.findIndex(u => u.id === id);
      if (idx === -1) return;

      config.users[idx].name = name;
      config.users[idx].url  = url;
      if (pwd) {
        if (pwd === config.adminPwd) { showToast('Réservé à l\'admin', true); return; }
        if (config.users.find((u,i) => u.pwd === pwd && i !== idx)) { showToast('Mot de passe déjà utilisé', true); return; }
        config.users[idx].pwd = pwd;
      }

      saveConfig(config);
      renderUserList();
      showToast('Utilisateur mis à jour');
    });
  });

  userListEl.querySelectorAll('.del-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const id = btn.dataset.id;
      const user = config.users.find(u => u.id === id);
      if (!user) return;
      if (!confirm(`Supprimer l'utilisateur "${user.name}" ?`)) return;
      config.users = config.users.filter(u => u.id !== id);
      saveConfig(config);
      renderUserList();
      showToast('Utilisateur supprimé');
    });
  });
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ══════════════════════════════════════════
// PWA — Icon, Manifest, Service Worker
// ══════════════════════════════════════════
(function() {
  // ── 1. Icône 192×192 générée en canvas (fond sombre + cadenas doré) ──
  function buildIconB64(size) {
    const c = document.createElement('canvas');
    c.width = c.height = size;
    const ctx = c.getContext('2d');
    const s = size;

    // Fond
    ctx.fillStyle = '#07070d';
    ctx.fillRect(0, 0, s, s);

    // Cercle doré
    const cx = s / 2, cy = s / 2, r = s * 0.36;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.strokeStyle = '#c9a84c';
    ctx.lineWidth = s * 0.04;
    ctx.stroke();

    // Cercle intérieur (fine ligne)
    ctx.beginPath();
    ctx.arc(cx, cy, r - s * 0.07, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(201,168,76,0.3)';
    ctx.lineWidth = s * 0.02;
    ctx.stroke();

    // Cadenas (dessin vectoriel simplifié)
    const lw = s * 0.28, lh = s * 0.22;
    const lx = cx - lw / 2, ly = cy - lh * 0.15;
    const br = s * 0.04;

    // Corps du cadenas
    ctx.fillStyle = '#c9a84c';
    ctx.beginPath();
    ctx.roundRect(lx, ly, lw, lh, br);
    ctx.fill();

    // Trou de serrure
    ctx.fillStyle = '#07070d';
    ctx.beginPath();
    ctx.arc(cx, ly + lh * 0.38, lw * 0.14, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillRect(cx - lw * 0.07, ly + lh * 0.38, lw * 0.14, lh * 0.32);

    // Anse
    const aw = lw * 0.52, ah = s * 0.18;
    const ax = cx - aw / 2, ay = ly - ah;
    ctx.strokeStyle = '#c9a84c';
    ctx.lineWidth = s * 0.055;
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(ax, ly);
    ctx.lineTo(ax, ay + aw * 0.5);
    ctx.arc(cx, ay + aw * 0.5, aw / 2, Math.PI, 0);
    ctx.lineTo(ax + aw, ly);
    ctx.stroke();

    return c.toDataURL('image/png');
  }

  const icon192 = buildIconB64(192);
  const icon512 = buildIconB64(512);

  // Apple touch icon
  const appleLink = document.getElementById('pwa-icon-apple');
  if (appleLink) appleLink.href = icon192;

  // ── 2. Manifest blob ──
  const manifest = {
    name: 'Portail d\'accès',
    short_name: 'Portail',
    description: 'Espace sécurisé multi-utilisateurs',
    start_url: './',
    scope: './',
    display: 'standalone',
    orientation: 'portrait-primary',
    background_color: '#07070d',
    theme_color: '#07070d',
    icons: [
      { src: icon192, sizes: '192x192', type: 'image/png', purpose: 'any maskable' },
      { src: icon512, sizes: '512x512', type: 'image/png', purpose: 'any maskable' }
    ]
  };

  const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
  const manifestUrl  = URL.createObjectURL(manifestBlob);
  const manifestLink = document.createElement('link');
  manifestLink.rel   = 'manifest';
  manifestLink.href  = manifestUrl;
  document.head.appendChild(manifestLink);

  // ── 3. Service Worker inline via blob ──
  const swCode = `
const CACHE = 'portail-v1';
const ASSETS = [self.location.href.replace(/\\/[^\\/]*$/, '') || '/'];
self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)).then(() => self.skipWaiting()));
});
self.addEventListener('activate', e => {
  e.waitUntil(clients.claim());
});
self.addEventListener('fetch', e => {
  if (e.request.method !== 'GET') return;
  e.respondWith(
    caches.match(e.request).then(cached => {
      const network = fetch(e.request).then(res => {
        if (res && res.status === 200) {
          const clone = res.clone();
          caches.open(CACHE).then(c => c.put(e.request, clone));
        }
        return res;
      }).catch(() => cached);
      return cached || network;
    })
  );
});
`;

  if ('serviceWorker' in navigator) {
    const swBlob = new Blob([swCode], { type: 'application/javascript' });
    const swUrl  = URL.createObjectURL(swBlob);
    navigator.serviceWorker.register(swUrl, { scope: './' }).catch(() => {});
  }

  // ── 4. Bouton Installer ──
  let deferredPrompt = null;
  const installBtn = document.getElementById('pwaInstallBtn');

  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    installBtn.classList.add('visible');
  });

  installBtn.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
    installBtn.classList.remove('visible');
    if (outcome === 'accepted') showToast('Application installée !');
  });

  window.addEventListener('appinstalled', () => {
    installBtn.classList.remove('visible');
    deferredPrompt = null;
  });
})();

// ── Init ──
window.addEventListener('load', () => {
  config = loadConfig();
  pwdInput.focus();
});
</script>
</body>
</html>
